apiVersion: v1
kind: ConfigMap
metadata:
  name: pgadmin-servers
  namespace: "llmmll"
data:
  servers.json: |
    {
      "Servers": {
        "1": {
          "Name": "llmmll-psql",
          "Group": "Servers",
          "Host": "postgres.llmmll.svc.cluster.local",
          "Port": 5432,
          "MaintenanceDB": "postgres",
          "Username": "lsm",
          "SSLMode": "prefer",
          "PassFile": "/pgadmin4/.pgpass"
        }
      }
    }