apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: llmmll-ingress
  namespace: llmmll
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/proxy-body-size: 100m
spec:
  ingressClassName: nginx
  rules:
    - host: api.llmmll.local
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: llmmll-server
                port:
                  number: 8001
          - path: /v1
            pathType: Prefix
            backend:
              service:
                name: llmmll-server
                port:
                  number: 8001
          - path: /anthropic
            pathType: Prefix
            backend:
              service:
                name: llmmll-server
                port:
                  number: 8001
    - host: composer.llmmll.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: llmmll-composer
                port:
                  number: 50051
    - host: runner.llmmll.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: llmmll-runner
                port:
                  number: 50052